server:
    port: 8080

spring:
    application:
        name: api-gateway
    config:
        import:
            - optional:classpath:.env.properties

jwt:
    access-token-secret: ${ACCESS_TOKEN_SECRET}

eureka:
    client:
        enabled: true
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true


