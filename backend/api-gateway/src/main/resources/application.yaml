server:
    port: 8080

spring:
    application:
        name: api-gateway
    config:
        import:
            - optional:classpath:.env.properties
    cloud:
        gateway:
            globalcors:
                corsConfigurations:
                    '[/**]':
                        allowedOrigins:
                            - "http://localhost:5173"
                        allowedMethods:
                            - GET
                            - POST
                            - PUT
                            - DELETE
                            - OPTIONS
                        allowedHeaders:
                            - "*"
                        allowCredentials: true

jwt:
    access-token-secret: ${ACCESS_TOKEN_SECRET}

eureka:
    client:
        enabled: true
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true


