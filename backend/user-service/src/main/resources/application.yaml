server:
    port: 8082

spring:
    application:
        name: user-service

    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:5432/ql_phongtro_user
        username: postgres
        password: ${DB_PASSWORD}
    jpa:
        hibernate.ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    logging.level.org:
        hibernate:
            SQL: DEBUG
            Type: TRACE
        springframework.security: DEBUG

eureka:
    client:
        enabled: true
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true