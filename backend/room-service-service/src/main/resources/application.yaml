server:
    port: 8083

spring:
    application:
        name: room-service-service

    config:
        import:
            - optional:classpath:.env.properties

    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:5432/ql_phongtro_service
        username: postgres
        password: ${DB_PASSWORD}
    jpa:
        hibernate.ddl-auto: update
        show-sql: true
    logging.level.org:
        hibernate:
            SQL: DEBUG
            Type: TRACE
        springframework.security: DEBUG

eureka:
    client:
        enabled: true
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true